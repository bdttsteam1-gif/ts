<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claim Management Dashboard</title>
<script src="chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2d3150;
    --accent: #4f7ef8;
    --accent2: #7c5cbf;
    --accent3: #3dbf8a;
    --text: #e8eaf6;
    --text2: #8b90b8;
    --red: #e05a5a;
    --orange: #f0943d;
    --yellow: #f5c842;
    --radius: 12px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* Layout */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .header { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent); }
  .search-wrap { flex: 1; max-width: 480px; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px 9px 38px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 14px; }
  .badge { background: var(--accent); color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; margin-left: auto; }
  .year-switcher { display: flex; gap: 6px; align-items: center; }
  .year-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .year-btn:hover { border-color: var(--accent); color: var(--accent); }
  .year-btn-active { background: var(--accent); border-color: var(--accent); color: #fff !important; }

  .content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Dashboard (main) */
  .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card h2 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 16px; }
  .card.full { grid-column: 1 / -1; }
  .stat-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat { flex: 1; background: var(--surface2); border-radius: var(--radius-sm); padding: 14px 16px; }
  .stat .val { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat .lbl { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .chart-wrap { position: relative; height: 300px; }

  /* Search results */
  .results-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .results-header h2 { font-size: 16px; font-weight: 700; }
  .results-header .count { font-size: 13px; color: var(--text2); }
  .back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 14px; color: var(--text); font-size: 13px; cursor: pointer; }
  .back-btn:hover { border-color: var(--accent); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; position: sticky; top: 0; }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: var(--surface2); cursor: pointer; }
  tr.active td { background: rgba(79,126,248,0.12); }

  /* Tags */
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-blue { background: rgba(79,126,248,0.2); color: #7da3fb; }
  .tag-green { background: rgba(61,191,138,0.2); color: #5dd4a6; }
  .tag-red { background: rgba(224,90,90,0.2); color: #e87d7d; }
  .tag-yellow { background: rgba(245,200,66,0.2); color: #f5c842; }

  /* Detail panel */
  .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; }
  .detail-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }
  .detail-panel { background: var(--surface); width: 560px; height: 100vh; overflow-y: auto; border-left: 1px solid var(--border); padding: 24px; }
  .detail-panel h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .detail-panel .no { font-size: 12px; color: var(--text2); margin-bottom: 20px; }
  .detail-close { position: absolute; top: 20px; right: 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; color: var(--text); font-size: 13px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-field { }
  .detail-field.full { grid-column: 1 / -1; }
  .detail-field label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 4px; }
  .detail-field p { font-size: 13px; line-height: 1.5; background: var(--surface2); border-radius: 6px; padding: 8px 10px; min-height: 32px; word-break: break-word; }
  .section-divider { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; grid-column: 1 / -1; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

  /* Lot/Item graph view */
  .graph-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .graph-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .graph-card h3 { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; }
  .graph-card p.hint { font-size: 11px; color: var(--text2); margin-top: 8px; text-align: center; }
  .graph-chart-wrap { position: relative; height: 260px; cursor: pointer; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state .ico { font-size: 48px; margin-bottom: 12px; }

  /* Top bar item list */
  .mini-list { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
  .mini-item { display: flex; justify-content: space-between; padding: 8px 10px; border-radius: 6px; font-size: 13px; }
  .mini-item:hover { background: var(--surface2); }
  .mini-item .name { color: var(--text); flex: 1; }
  .mini-item .cnt { color: var(--accent); font-weight: 700; font-size: 13px; padding-left: 12px; }
</style>
<script src="claim-data.js"></script>
</head>
<body>
<div class="app">
  <div class="header">
    <a href="index.html" class="home-btn">← 홈</a>
    <h1>Claim <span>Dashboard</span></h1>
    <div class="year-switcher">
      <button class="year-btn" data-year="2024" onclick="switchYear('2024')">2024</button>
      <button class="year-btn year-btn-active" data-year="2025" onclick="switchYear('2025')">2025</button>
      <button class="year-btn" data-year="2026" onclick="switchYear('2026')">2026</button>
    </div>
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="국가, Distributor, LOT No., 아이템명 검색..." autocomplete="off">
    </div>
    <div class="badge" id="totalBadge">0 건</div>
  </div>
  <div class="content" id="mainContent">
    <!-- Filled by JS -->
  </div>
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close" onclick="closeDetail()">✕ 닫기</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
// Normalize
let currentYear = '2025';

function normalizeRaw(arr) {
  return arr.map(r => {
    const o = {};
    for (const [k, v] of Object.entries(r)) o[k] = (v === null || v === undefined) ? '' : String(v).trim();
    return o;
  });
}

const DATA_2024 = normalizeRaw(RAW_2024);
const DATA_2025 = normalizeRaw(RAW_2025);
const DATA_2026 = normalizeRaw(RAW_2026);

function getActiveData() {
  if (currentYear === '2024') return DATA_2024;
  if (currentYear === '2026') return DATA_2026;
  return DATA_2025;
}

let DATA = getActiveData();

function switchYear(year) {
  currentYear = year;
  DATA = getActiveData();
  document.querySelectorAll('.year-btn').forEach(b => {
    b.classList.toggle('year-btn-active', b.dataset.year === year);
  });
  document.getElementById('searchInput').value = '';
  renderDashboard();
}

const COLORS = ['#4f7ef8','#3dbf8a','#f0943d','#7c5cbf','#e05a5a','#f5c842','#44c9d4','#e88f5a','#a3e05a','#d45ae8','#5ae8bb','#e85a8f','#5a8fe8','#e8d45a','#8fe85a'];
const COLORS2 = COLORS.map(c => c + '55');

function countBy(arr, key) {
  const m = {};
  for (const r of arr) {
    const v = r[key] || '(없음)';
    m[v] = (m[v] || 0) + 1;
  }
  return Object.entries(m).sort((a, b) => b[1] - a[1]);
}

function tag(text, cls='tag-blue') {
  if (!text) return '';
  return `<span class="tag ${cls}">${text}</span>`;
}

function severityTag(s) {
  if (!s) return '';
  if (s.includes('High') || s.includes('high')) return tag(s, 'tag-red');
  if (s.includes('Moderate') || s.includes('moderate')) return tag(s, 'tag-yellow');
  if (s.includes('Low') || s.includes('low')) return tag(s, 'tag-green');
  return tag(s, 'tag-blue');
}

function termTag(s) {
  if (!s) return '';
  if (s === 'Closed') return tag(s, 'tag-green');
  if (s === 'On Going') return tag(s, 'tag-yellow');
  return tag(s, 'tag-blue');
}

// ---- DETAIL PANEL ----
function showDetail(row) {
  const fields = [
    ['Complaint No.', row.no, false],
    ['수신일', row.recv_date, false],
    ['담당자', row.receiver, false],
    ['상태', termTag(row.term) || row.term, false],
    ['국가 / 지역', `${row.country} / ${row.area}`, false],
    ['Distributor', row.dist, false],
    ['연락처', row.contact, false],
    ['이메일', row.email, false],
    ['Via', row.via, false],
    ['중증도', severityTag(row.severity) || row.severity, false],
    ['---분류', '', false],
    ['1st CLASS', row.c1, false],
    ['2nd CLASS', row.c2, false],
    ['3rd CLASS', row.c3, false],
    ['---기기/제품', '', false],
    ['Item', row.item, false],
    ['LOT No.', row.lot, false],
    ['Control LOT', row.ctrl_lot, false],
    ['Device', row.device, false],
    ['Serial No.', row.serial, false],
    ['SW Version', row.sw, false],
    ['---내용', '', false],
    ['제목', row.title, true],
    ['클레임 내용', row.complaint, true],
    ['조사 내용', row.invest, true],
    ['Action', row.action, true],
    ['Reply', row.reply, false],
    ['회신일', row.replied, false],
    ['처리기간(일)', row.dur, false],
  ];

  let html = `<h3>${row.title || row.no}</h3><div class="no">${row.no}</div><div class="detail-grid">`;
  for (const [label, val, full] of fields) {
    if (label.startsWith('---')) {
      html += `<div class="section-divider">${label.slice(3)}</div>`;
    } else {
      html += `<div class="detail-field ${full ? 'full' : ''}"><label>${label}</label><p>${val || '-'}</p></div>`;
    }
  }
  html += '</div>';

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
}
document.getElementById('detailOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

// ---- CHARTS ----
const chartInstances = {};
function destroyChart(id) {
  if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
}

function makeBarChart(canvasId, labels, values, clickFn) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  const top = labels.slice(0, 15);
  const vals = values.slice(0, 15);
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top,
      datasets: [{
        data: vals,
        backgroundColor: COLORS2.slice(0, top.length),
        borderColor: COLORS.slice(0, top.length),
        borderWidth: 2,
        borderRadius: 5,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8b90b8', font: { size: 11 } }, grid: { color: '#2d3150' } },
        y: { ticks: { color: '#8b90b8', font: { size: 11 } }, grid: { color: '#2d3150' } }
      },
      onClick: (event, elements) => {
        if (elements.length > 0 && clickFn) clickFn(top[elements[0].index]);
      }
    }
  });
}

function makeDoughnutChart(canvasId, labels, values, clickFn) {
  destroyChart(canvasId);
  const ctx = document.getElementById(canvasId).getContext('2d');
  const top = labels.slice(0, 10);
  const vals = values.slice(0, 10);
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: top,
      datasets: [{
        data: vals,
        backgroundColor: COLORS2.slice(0, top.length),
        borderColor: COLORS.slice(0, top.length),
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { color: '#8b90b8', font: { size: 11 }, boxWidth: 12 } }
      },
      onClick: (event, elements) => {
        if (elements.length > 0 && clickFn) clickFn(top[elements[0].index]);
      }
    }
  });
}

// ---- VIEWS ----

let currentView = 'dashboard';
let viewStack = [];

function renderDashboard() {
  currentView = 'dashboard';
  const total = DATA.length;
  document.getElementById('totalBadge').textContent = total.toLocaleString() + ' 건';

  const countryCounts = countBy(DATA, 'country');
  const itemCounts = countBy(DATA, 'item').filter(([k]) => k && k !== '(없음)');
  const c3Counts = countBy(DATA, 'c3').filter(([k]) => k && k !== '(없음)');
  const termCounts = countBy(DATA, 'term');

  const closed = (DATA.filter(r => r.term === 'Closed').length);
  const ongoing = (DATA.filter(r => r.term === 'On Going').length);

  const topCountries = countryCounts.slice(0, 10);
  const topItems = itemCounts.slice(0, 8);

  let html = `
  <div class="stat-row">
    <div class="stat"><div class="val">${total.toLocaleString()}</div><div class="lbl">전체 클레임</div></div>
    <div class="stat"><div class="val" style="color:var(--accent3)">${closed.toLocaleString()}</div><div class="lbl">Closed</div></div>
    <div class="stat"><div class="val" style="color:var(--yellow)">${ongoing.toLocaleString()}</div><div class="lbl">On Going</div></div>
    <div class="stat"><div class="val" style="color:var(--accent2)">${countryCounts.length}</div><div class="lbl">접수 국가 수</div></div>
  </div>
  <div class="dashboard-grid">
    <div class="card">
      <h2>국가별 클레임 수량 (상위 10)</h2>
      <div class="chart-wrap"><canvas id="chartCountry"></canvas></div>
    </div>
    <div class="card">
      <h2>아이템별 클레임 수량 (상위 8)</h2>
      <div class="chart-wrap"><canvas id="chartItem"></canvas></div>
    </div>
    <div class="card">
      <h2>3rd CLASS 분류</h2>
      <div class="chart-wrap"><canvas id="chartC3"></canvas></div>
    </div>
    <div class="card">
      <h2>전체 국가 목록</h2>
      <div class="mini-list">
        ${countryCounts.map(([n, c]) => `<div class="mini-item"><span class="name">${n}</span><span class="cnt">${c}</span></div>`).join('')}
      </div>
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML = html;

  requestAnimationFrame(() => {
    makeBarChart('chartCountry', topCountries.map(([k]) => k), topCountries.map(([,v]) => v));
    makeBarChart('chartItem', topItems.map(([k]) => k), topItems.map(([,v]) => v));
    makeDoughnutChart('chartC3', c3Counts.map(([k]) => k).slice(0,10), c3Counts.map(([,v]) => v).slice(0,10));
  });
}

function renderCountryOrDistributor(keyword, matchedRows, searchType) {
  // Show table with item, lot, c3
  const html = `
  <div class="results-header">
    <button class="back-btn" onclick="goBack()">← 뒤로</button>
    <h2>${keyword}</h2>
    <span class="count">${matchedRows.length}건</span>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Complaint No.</th><th>Item</th><th>LOT No.</th><th>3rd CLASS</th><th>국가</th><th>수신일</th><th>상태</th></tr></thead>
        <tbody>
          ${matchedRows.map((r, i) => `
          <tr onclick="showDetail(DATA_MAP['${r.no}'])" title="클릭하여 상세 보기">
            <td style="color:var(--text2)">${i+1}</td>
            <td style="font-weight:600;color:var(--accent)">${r.no}</td>
            <td>${r.item || '-'}</td>
            <td>${r.lot || '-'}</td>
            <td>${r.c3 || '-'}</td>
            <td>${r.country || '-'}</td>
            <td>${r.recv_date || '-'}</td>
            <td>${termTag(r.term) || r.term || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  document.getElementById('mainContent').innerHTML = html;
}

function renderLotNo(lotNo, matchedRows) {
  const countryCounts = countBy(matchedRows, 'country');
  const c3Counts = countBy(matchedRows, 'c3').filter(([k]) => k && k !== '(없음)');

  const html = `
  <div class="results-header">
    <button class="back-btn" onclick="goBack()">← 뒤로</button>
    <h2>LOT No. : ${lotNo}</h2>
    <span class="count">${matchedRows.length}건</span>
  </div>
  <div class="graph-section">
    <div class="graph-card">
      <h3>접수 국가</h3>
      <div class="graph-chart-wrap"><canvas id="lotCountryChart"></canvas></div>
      <p class="hint">클릭하면 해당 클레임 목록을 봅니다</p>
    </div>
    <div class="graph-card">
      <h3>3rd CLASS 분류</h3>
      <div class="graph-chart-wrap"><canvas id="lotC3Chart"></canvas></div>
      <p class="hint">클릭하면 해당 클레임 목록을 봅니다</p>
    </div>
  </div>
  <div id="lotSubResults"></div>`;

  document.getElementById('mainContent').innerHTML = html;

  requestAnimationFrame(() => {
    makeBarChart('lotCountryChart', countryCounts.map(([k]) => k), countryCounts.map(([,v]) => v), (country) => {
      const filtered = matchedRows.filter(r => r.country === country);
      showLotSubTable(filtered, `LOT: ${lotNo} — 국가: ${country}`);
    });
    makeDoughnutChart('lotC3Chart', c3Counts.map(([k]) => k), c3Counts.map(([,v]) => v), (c3) => {
      const filtered = matchedRows.filter(r => r.c3 === c3);
      showLotSubTable(filtered, `LOT: ${lotNo} — ${c3}`);
    });
  });
}

function showLotSubTable(rows, title) {
  const el = document.getElementById('lotSubResults');
  if (!el) return;
  el.innerHTML = `
  <div class="card" style="margin-top:0">
    <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px">${title} (${rows.length}건)</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Complaint No.</th><th>Item</th><th>LOT No.</th><th>3rd CLASS</th><th>국가</th><th>수신일</th><th>상태</th></tr></thead>
        <tbody>
          ${rows.map((r, i) => `
          <tr onclick="showDetail(DATA_MAP['${r.no}'])" title="클릭하여 상세 보기">
            <td style="color:var(--text2)">${i+1}</td>
            <td style="font-weight:600;color:var(--accent)">${r.no}</td>
            <td>${r.item || '-'}</td>
            <td>${r.lot || '-'}</td>
            <td>${r.c3 || '-'}</td>
            <td>${r.country || '-'}</td>
            <td>${r.recv_date || '-'}</td>
            <td>${termTag(r.term) || r.term || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  el.scrollIntoView({ behavior: 'smooth' });
}

function renderItem(itemName, matchedRows) {
  const countryCounts = countBy(matchedRows, 'country');
  const c3Counts = countBy(matchedRows, 'c3').filter(([k]) => k && k !== '(없음)');

  const html = `
  <div class="results-header">
    <button class="back-btn" onclick="goBack()">← 뒤로</button>
    <h2>Item : ${itemName}</h2>
    <span class="count">${matchedRows.length}건</span>
  </div>
  <div class="graph-section">
    <div class="graph-card">
      <h3>접수 국가</h3>
      <div class="graph-chart-wrap"><canvas id="itemCountryChart"></canvas></div>
      <p class="hint">클릭하면 LOT / 3rd CLASS 목록을 봅니다</p>
    </div>
    <div class="graph-card">
      <h3>3rd CLASS 분류</h3>
      <div class="graph-chart-wrap"><canvas id="itemC3Chart"></canvas></div>
      <p class="hint">클릭하면 LOT / 3rd CLASS 목록을 봅니다</p>
    </div>
  </div>
  <div id="itemSubResults"></div>`;

  document.getElementById('mainContent').innerHTML = html;

  requestAnimationFrame(() => {
    makeBarChart('itemCountryChart', countryCounts.map(([k]) => k), countryCounts.map(([,v]) => v), (country) => {
      const filtered = matchedRows.filter(r => r.country === country);
      showItemSubTable(filtered, `${itemName} — 국가: ${country}`);
    });
    makeDoughnutChart('itemC3Chart', c3Counts.map(([k]) => k), c3Counts.map(([,v]) => v), (c3) => {
      const filtered = matchedRows.filter(r => r.c3 === c3);
      showItemSubTable(filtered, `${itemName} — ${c3}`);
    });
  });
}

function showItemSubTable(rows, title) {
  const el = document.getElementById('itemSubResults');
  if (!el) return;
  el.innerHTML = `
  <div class="card" style="margin-top:0">
    <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:12px">${title} (${rows.length}건)</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Complaint No.</th><th>LOT No.</th><th>3rd CLASS</th><th>국가</th><th>수신일</th><th>상태</th></tr></thead>
        <tbody>
          ${rows.map((r, i) => `
          <tr onclick="showDetail(DATA_MAP['${r.no}'])" title="클릭하여 상세 보기">
            <td style="color:var(--text2)">${i+1}</td>
            <td style="font-weight:600;color:var(--accent)">${r.no}</td>
            <td>${r.lot || '-'}</td>
            <td>${r.c3 || '-'}</td>
            <td>${r.country || '-'}</td>
            <td>${r.recv_date || '-'}</td>
            <td>${termTag(r.term) || r.term || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  el.scrollIntoView({ behavior: 'smooth' });
}

function renderGenericSearch(keyword, matchedRows) {
  const html = `
  <div class="results-header">
    <button class="back-btn" onclick="goBack()">← 뒤로</button>
    <h2>"${keyword}" 검색 결과</h2>
    <span class="count">${matchedRows.length}건</span>
  </div>
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Complaint No.</th><th>국가</th><th>Item</th><th>LOT No.</th><th>3rd CLASS</th><th>수신일</th><th>상태</th></tr></thead>
        <tbody>
          ${matchedRows.map((r, i) => `
          <tr onclick="showDetail(DATA_MAP['${r.no}'])" title="클릭하여 상세 보기">
            <td style="color:var(--text2)">${i+1}</td>
            <td style="font-weight:600;color:var(--accent)">${r.no}</td>
            <td>${r.country || '-'}</td>
            <td>${r.item || '-'}</td>
            <td>${r.lot || '-'}</td>
            <td>${r.c3 || '-'}</td>
            <td>${r.recv_date || '-'}</td>
            <td>${termTag(r.term) || r.term || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  document.getElementById('mainContent').innerHTML = html;
}

// ---- DATA MAP ----
const DATA_MAP = {};
for (const r of DATA) DATA_MAP[r.no] = r;

// ---- SEARCH LOGIC ----
function detectSearchType(keyword, matchedRows) {
  const kl = keyword.toLowerCase();
  // Check if majority match on country
  const countries = new Set(DATA.map(r => r.country.toLowerCase()));
  if (countries.has(kl)) return 'country';

  const dists = new Set(DATA.map(r => r.dist.toLowerCase()));
  if (dists.has(kl)) return 'distributor';

  // Check if it looks like a lot no. (alphanumeric pattern)
  const lots = new Set(DATA.map(r => r.lot.toLowerCase()).filter(Boolean));
  if (lots.has(kl)) return 'lot';

  const items = new Set(DATA.map(r => r.item.toLowerCase()).filter(Boolean));
  if (items.has(kl)) return 'item';

  // Partial matches
  const countryMatch = matchedRows.filter(r => r.country.toLowerCase().includes(kl)).length;
  const distMatch = matchedRows.filter(r => r.dist.toLowerCase().includes(kl)).length;
  const lotMatch = matchedRows.filter(r => r.lot.toLowerCase().includes(kl)).length;
  const itemMatch = matchedRows.filter(r => r.item.toLowerCase().includes(kl)).length;

  const maxVal = Math.max(countryMatch, distMatch, lotMatch, itemMatch);
  if (maxVal === 0) return 'generic';
  if (countryMatch === maxVal) return 'country';
  if (distMatch === maxVal) return 'distributor';
  if (lotMatch === maxVal) return 'lot';
  if (itemMatch === maxVal) return 'item';
  return 'generic';
}

function doSearch(keyword) {
  const kl = keyword.toLowerCase();
  const matched = DATA.filter(r => {
    return Object.values(r).some(v => v.toLowerCase().includes(kl));
  });

  if (matched.length === 0) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state"><div class="ico">🔍</div><p>"${keyword}"에 해당하는 결과가 없습니다.</p></div>`;
    return;
  }

  const type = detectSearchType(keyword, matched);

  viewStack.push({ view: currentView, keyword: '' });
  currentView = 'search';

  if (type === 'lot') {
    // Use the first exact or partial lot match
    const exactLots = [...new Set(matched.map(r => r.lot).filter(l => l.toLowerCase().includes(kl)))];
    if (exactLots.length === 1) {
      renderLotNo(exactLots[0], matched);
    } else {
      renderGenericSearch(keyword, matched);
    }
  } else if (type === 'item') {
    const exactItems = [...new Set(matched.map(r => r.item).filter(i => i.toLowerCase().includes(kl)))];
    if (exactItems.length === 1) {
      renderItem(exactItems[0], matched);
    } else {
      renderGenericSearch(keyword, matched);
    }
  } else if (type === 'country' || type === 'distributor') {
    renderCountryOrDistributor(keyword, matched, type);
  } else {
    renderGenericSearch(keyword, matched);
  }
}

function goBack() {
  if (viewStack.length > 0) {
    const prev = viewStack.pop();
    if (prev.view === 'dashboard') {
      renderDashboard();
    }
  } else {
    renderDashboard();
  }
}

// ---- SEARCH INPUT ----
let searchTimer;
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const val = this.value.trim();
  if (!val) { renderDashboard(); return; }
  searchTimer = setTimeout(() => doSearch(val), 400);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    clearTimeout(searchTimer);
    const val = this.value.trim();
    if (val) doSearch(val);
  }
});

// ---- INIT ----
renderDashboard();
</script>
