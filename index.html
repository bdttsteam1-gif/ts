<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boditech MED — 내부 포털</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f3f6;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      background: #1a1a2e;
      color: #fff;
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-brand { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
    .nav-brand span { color: #2563eb; }

    /* HERO */
    .hero {
      background: #1a1a2e;
      color: #fff;
      padding: 48px 24px 56px;
      text-align: center;
    }
    .hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
    .hero p { font-size: 14px; color: #8b90b8; margin-bottom: 28px; }

    /* SEARCH */
    .search-wrap {
      display: flex;
      max-width: 560px;
      margin: 0 auto;
      gap: 8px;
    }
    .search-wrap input {
      flex: 1;
      height: 44px;
      padding: 0 16px;
      border: 1px solid #2d3150;
      border-radius: 8px;
      background: #22263a;
      color: #e8eaf6;
      font-size: 14px;
      outline: none;
    }
    .search-wrap input::placeholder { color: #555b80; }
    .search-wrap input:focus { border-color: #2563eb; }
    .search-wrap button {
      height: 44px;
      padding: 0 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .search-wrap button:hover { background: #1d4ed8; }

    /* CARDS */
    .cards {
      max-width: 840px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #2563eb; }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #6b7280;
    }
    .card h2 { font-size: 18px; font-weight: 700; color: #111827; }
    .card p { font-size: 13px; color: #6b7280; line-height: 1.6; }
    .card-arrow {
      margin-top: 8px;
      font-size: 13px;
      color: #2563eb;
      font-weight: 600;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 12px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
      margin-top: 24px;
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Boditech <span>MED</span></div>
</nav>

<section class="hero">
  <h1>내부 포털</h1>
  <p>클레임 현황 및 가이드 문서를 통합 검색하거나 직접 확인하세요.</p>
  <form class="search-wrap" action="search.html" method="get" onsubmit="return goSearchForm(this)">
    <input type="text" id="q" name="q" placeholder="키워드를 입력하세요 (예: ichroma, 캘리브레이션)" autocomplete="off" />
    <button type="submit">검색</button>
  </form>
</section>

<div class="cards">
  <a class="card" href="claim.html">
    <div class="card-label">Dashboard</div>
    <h2>클레임 현황</h2>
    <p>지역별·유형별 클레임 통계와 상세 목록을 확인하고 필터링합니다.</p>
    <div class="card-arrow">바로가기 →</div>
  </a>
  <a class="card" href="guide.html">
    <div class="card-label">Guide</div>
    <h2>업무 가이드</h2>
    <p>클레임 처리 절차, 장비별 대응 방법 등 운영 가이드를 확인합니다.</p>
    <div class="card-arrow">바로가기 →</div>
  </a>
  <a class="card" href="search.html">
    <div class="card-label">Search</div>
    <h2>통합검색</h2>
    <p>클레임과 가이드 전체 데이터를 한 번에 검색합니다.</p>
    <div class="card-arrow">바로가기 →</div>
  </a>
</div>

<footer>Boditech MED Internal Portal</footer>

<script>
  function goSearchForm(form) {
    var q = form.q.value.trim();
    if (q.length < 1) { form.q.focus(); return false; }
    window.location.href = 'search.html?q=' + encodeURIComponent(q);
    return false;
  }
</script>

</body>
</html>
