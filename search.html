<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>통합검색 — Boditech MED</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff; color: #1a1a2e; font-size: 14px; min-height: 100vh; }

.nav { background: #1a1a2e; color: #fff; padding: 0 20px; display: flex; align-items: center; height: 52px; gap: 16px; position: sticky; top: 0; z-index: 100; }
.nav-brand { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.nav-brand span { color: #2563eb; }
.nav-home { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 14px; border-radius: 6px; text-decoration: none; font-size: 13px; margin-left: auto; }
.nav-home:hover { background: rgba(255,255,255,0.2); }

.search-bar { background: #1a1a2e; padding: 20px 24px 24px; border-bottom: 1px solid #2d3150; }
.search-bar h1 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 14px; }
.search-bar h1 span { color: #2563eb; }
.search-row { display: flex; gap: 10px; align-items: center; max-width: 800px; }
.search-input-wrap { flex: 1; position: relative; }
.search-input-wrap input { width: 100%; padding: 11px 16px 11px 40px; background: #22263a; border: 1px solid #2d3150; border-radius: 8px; color: #e8eaf6; font-size: 15px; outline: none; transition: border-color 0.2s; }
.search-input-wrap input:focus { border-color: #2563eb; }
.search-input-wrap input::placeholder { color: #8b90b8; }
.search-input-wrap .ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #8b90b8; font-size: 15px; }
.search-btn { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 11px 22px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.search-btn:hover { background: #1d4ed8; }
.clear-btn { background: #22263a; color: #8b90b8; border: 1px solid #2d3150; border-radius: 8px; padding: 11px 16px; font-size: 14px; cursor: pointer; }
.clear-btn:hover { color: #e8eaf6; }

.tab-bar { display: flex; gap: 8px; padding: 16px 24px 0; border-bottom: 1px solid #d1d5db; background: #fff; }
.tab { background: none; border: none; padding: 10px 18px; font-size: 14px; font-weight: 600; color: #6b7280; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab:hover { color: #1a1a2e; }
.tab.active { color: #2563eb; border-bottom-color: #2563eb; }
.tab .cnt { font-size: 12px; background: #e5e7eb; color: #374151; border-radius: 10px; padding: 1px 7px; margin-left: 6px; font-weight: 600; }
.tab.active .cnt { background: #dbeafe; color: #2563eb; }

.content { padding: 20px 24px; max-width: 1100px; }

.stats-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card { background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 14px 20px; min-width: 160px; }
.stat-card .val { font-size: 26px; font-weight: 800; color: #2563eb; line-height: 1; }
.stat-card .lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }

.results-wrap { display: flex; flex-direction: column; gap: 8px; }
.result-card { background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: border-color 0.15s; }
.result-card:hover { border-color: #2563eb; }
.result-card .rc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.result-card .rc-source { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.source-claim { background: #dbeafe; color: #1d4ed8; }
.source-guide { background: #d1fae5; color: #065f46; }
.result-card .rc-title { font-size: 14px; font-weight: 600; color: #111827; }
.result-card .rc-meta { font-size: 12px; color: #6b7280; margin-bottom: 6px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.result-card .rc-body { font-size: 13px; color: #374151; line-height: 1.5; }
.highlight { background: #fef08a; border-radius: 2px; padding: 0 1px; }

.load-more-wrap { text-align: center; margin-top: 16px; }
.load-more-btn { background: #fff; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 28px; font-size: 14px; color: #374151; cursor: pointer; font-weight: 600; }
.load-more-btn:hover { border-color: #2563eb; color: #2563eb; }

.empty-state { text-align: center; padding: 80px 20px; color: #9ca3af; }
.empty-state .big { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }
.empty-state small { font-size: 13px; margin-top: 6px; display: block; color: #d1d5db; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
.modal-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }
.modal-panel { background: #fff; width: 560px; height: 100vh; overflow-y: auto; border-left: 1px solid #d1d5db; padding: 24px; position: relative; }
.modal-close { position: absolute; top: 16px; right: 16px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; color: #374151; }
.modal-close:hover { background: #e5e7eb; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; padding-right: 60px; line-height: 1.4; }
.modal-sub { font-size: 12px; color: #6b7280; margin-bottom: 20px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mf { }
.mf.full { grid-column: 1 / -1; }
.mf label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 4px; }
.mf p { font-size: 13px; line-height: 1.5; background: #f9fafb; border-radius: 6px; padding: 8px 10px; min-height: 30px; word-break: break-word; color: #111827; white-space: pre-wrap; }
.mf-divider { font-size: 11px; font-weight: 700; color: #2563eb; text-transform: uppercase; letter-spacing: 1px; grid-column: 1 / -1; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; margin-top: 8px; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-green { background: #d1fae5; color: #065f46; }
.tag-yellow { background: #fef9c3; color: #854d0e; }
.tag-red { background: #fee2e2; color: #991b1b; }
.tag-blue { background: #dbeafe; color: #1d4ed8; }
.cause-item { border-left: 3px solid #2563eb; padding: 8px 12px; margin-bottom: 8px; background: #f9fafb; border-radius: 4px; }
.cause-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.cause-detail { font-size: 12px; color: #374151; margin-top: 4px; }
.cause-solution { font-size: 12px; color: #065f46; margin-top: 4px; }
</style>
</head>
<body>

<div id="loadingBanner" style="background:#1d4ed8;color:#fff;padding:10px 24px;font-size:13px;text-align:center;position:sticky;top:52px;z-index:99;display:flex;align-items:center;justify-content:center;gap:12px;">
  <span id="loadingText">데이터 로딩 중... (8 MB, 처음 접속 시 10~20초 소요될 수 있습니다)</span>
  <span id="loadingSpinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<nav class="nav">
  <div class="nav-brand">Boditech <span>MED</span></div>
  <a href="index.html" class="nav-home">홈으로</a>
</nav>

<div class="search-bar">
  <h1>통합 <span>검색</span></h1>
  <div class="search-row">
    <div class="search-input-wrap">
      <span class="ico">&#128269;</span>
      <input type="text" id="searchInput" placeholder="국가, LOT No., 에러코드, 증상, 아이템명 등 검색 (여러 키워드는 공백으로 구분)" autocomplete="off">
    </div>
    <button class="search-btn" onclick="runSearch()">검색</button>
    <button class="clear-btn" onclick="clearSearch()">초기화</button>
  </div>
</div>

<div class="tab-bar" id="tabBar" style="display:none">
  <button class="tab active" data-tab="all" onclick="switchTab('all')">전체 <span class="cnt" id="cnt-all">0</span></button>
  <button class="tab" data-tab="claim" onclick="switchTab('claim')">Claim <span class="cnt" id="cnt-claim">0</span></button>
  <button class="tab" data-tab="guide" onclick="switchTab('guide')">Guide <span class="cnt" id="cnt-guide">0</span></button>
</div>

<div class="content" id="mainContent">
  <div class="empty-state">
    <div class="big">&#128269;</div>
    <p>검색어를 입력하면 Claim · Guide 데이터를 동시에 검색합니다.</p>
    <small>여러 키워드는 공백으로 구분해 검색할 수 있습니다.</small>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-panel" id="modalPanel">
    <button class="modal-close" onclick="closeModal()">&#10005; 닫기</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ── 전역 상태 (데이터 로드 전 안전한 기본값) ──
var CLAIM_ALL = [];
var GUIDE_ALL = [];
var CLAIM_MAP = {};
var _dataReady = false;
var allResults = [];
var currentTab = 'all';
var displayCount = 20;
var searchTimer;
var _guideResultMap = {};

// ── 데이터 정규화 ──
function normalizeClaim(arr) {
  if (!Array.isArray(arr)) return [];
  return arr.map(function(r) {
    var o = {};
    Object.keys(r).forEach(function(k) {
      o[k] = (r[k] === null || r[k] === undefined) ? '' : String(r[k]).trim();
    });
    return o;
  });
}

function flattenGuide(data) {
  if (!data || typeof data !== 'object') return [];
  var items = [];
  (data.type1_error_index || []).forEach(function(r) { items.push(Object.assign({}, r, {_type:'ei'})); });
  (data.type1_afias_detail || []).forEach(function(r) { items.push(Object.assign({}, r, {_type:'afias_d'})); });
  (data.type2_afias || []).forEach(function(r) { items.push(Object.assign({}, r, {_type:'afias_e'})); });
  (data.type2_ichroma || []).forEach(function(r) { items.push(Object.assign({}, r, {_type:'ichroma_e'})); });
  (data.type2_faq || []).forEach(function(r) { items.push(Object.assign({}, r, {_type:'faq'})); });
  return items;
}

// ── 유틸 ──
function hl(text, kw) {
  if (!kw || !text) return text || '';
  var escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp('(' + escaped + ')', 'gi'), '<span class="highlight">$1</span>');
}
function termTag(s) {
  if (!s) return '';
  if (s === 'Closed') return '<span class="tag tag-green">Closed</span>';
  if (s === 'On Going') return '<span class="tag tag-yellow">On Going</span>';
  return '<span class="tag tag-blue">' + s + '</span>';
}
function severityTag(s) {
  if (!s) return '';
  var sl = s.toLowerCase();
  if (sl.includes('high')) return '<span class="tag tag-red">' + s + '</span>';
  if (sl.includes('moderate')) return '<span class="tag tag-yellow">' + s + '</span>';
  if (sl.includes('low')) return '<span class="tag tag-green">' + s + '</span>';
  return '<span class="tag tag-blue">' + s + '</span>';
}

// ── 검색 ──
function runSearch() {
  if (!_dataReady) {
    var banner = document.getElementById('loadingBanner');
    if (banner) {
      document.getElementById('loadingText').textContent = '아직 데이터를 로딩 중입니다. 완료 후 자동으로 검색됩니다.';
    }
    return;
  }
  var kw = document.getElementById('searchInput').value.trim();
  if (!kw) { clearSearch(); return; }

  var keywords = kw.toLowerCase().split(/\s+/).filter(Boolean);

  var claimMatched = CLAIM_ALL.filter(function(r) {
    var text = Object.values(r).map(function(v) { return String(v).toLowerCase(); }).join(' ');
    return keywords.every(function(word) { return text.includes(word); });
  });
  var guideMatched = GUIDE_ALL.filter(function(r) {
    var text = JSON.stringify(r).toLowerCase();
    return keywords.every(function(word) { return text.includes(word); });
  });

  allResults = [];
  claimMatched.forEach(function(r) { allResults.push({_source:'claim', data:r}); });
  guideMatched.forEach(function(r) { allResults.push({_source:'guide', data:r}); });

  document.getElementById('cnt-all').textContent = allResults.length;
  document.getElementById('cnt-claim').textContent = claimMatched.length;
  document.getElementById('cnt-guide').textContent = guideMatched.length;

  document.getElementById('tabBar').style.display = 'flex';
  currentTab = 'all';
  displayCount = 20;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === 'all');
  });
  renderResults(kw);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('tabBar').style.display = 'none';
  allResults = [];
  currentTab = 'all';
  document.getElementById('mainContent').innerHTML =
    '<div class="empty-state"><div class="big">&#128269;</div><p>검색어를 입력하면 Claim · Guide 데이터를 동시에 검색합니다.</p><small>여러 키워드는 공백으로 구분해 검색할 수 있습니다.</small></div>';
}

function switchTab(tab) {
  currentTab = tab;
  displayCount = 20;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  var kw = document.getElementById('searchInput').value.trim();
  renderResults(kw);
}

function getFiltered() {
  if (currentTab === 'claim') return allResults.filter(function(r) { return r._source === 'claim'; });
  if (currentTab === 'guide') return allResults.filter(function(r) { return r._source === 'guide'; });
  return allResults;
}

// ── 렌더링 ──
function renderResults(kw) {
  var filtered = getFiltered();
  var shown = filtered.slice(0, displayCount);
  var content = document.getElementById('mainContent');

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty-state"><div class="big">&#128269;</div><p>"' + kw + '"에 해당하는 결과가 없습니다.</p></div>';
    return;
  }

  var claimCnt = allResults.filter(function(r){ return r._source==='claim'; }).length;
  var guideCnt = allResults.filter(function(r){ return r._source==='guide'; }).length;
  var tabLabel = currentTab === 'all' ? '전체' : currentTab === 'claim' ? 'Claim' : 'Guide';

  var statsHtml = '<div class="stats-row">' +
    '<div class="stat-card"><div class="val">' + filtered.length.toLocaleString() + '</div><div class="lbl">검색 결과 (' + tabLabel + ')</div></div>' +
    '<div class="stat-card"><div class="val" style="color:#1d4ed8">' + claimCnt.toLocaleString() + '</div><div class="lbl">Claim 결과</div></div>' +
    '<div class="stat-card"><div class="val" style="color:#065f46">' + guideCnt.toLocaleString() + '</div><div class="lbl">Guide 결과</div></div>' +
    '</div>';

  _guideResultMap = {};
  var cardsHtml = shown.map(function(item) {
    var globalIdx = filtered.indexOf(item);
    return item._source === 'claim'
      ? renderClaimCard(item.data, kw)
      : renderGuideCard(item.data, kw, globalIdx);
  }).join('');

  var loadMoreHtml = filtered.length > displayCount
    ? '<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMore()">더 보기 (' + (filtered.length - displayCount).toLocaleString() + '건 남음)</button></div>'
    : '';

  content.innerHTML = statsHtml + '<div class="results-wrap">' + cardsHtml + '</div>' + loadMoreHtml;
}

function loadMore() {
  displayCount += 20;
  renderResults(document.getElementById('searchInput').value.trim());
}

// ── Claim 카드 ──
function renderClaimCard(r, kw) {
  var snippet = [r.complaint, r.invest, r.reply].filter(Boolean).join(' ').slice(0, 120);
  var noEsc = (r.no || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
  return '<div class="result-card" onclick="showClaimDetail(\'' + noEsc + '\')">' +
    '<div class="rc-header"><span class="rc-source source-claim">Claim</span><span class="rc-title">' + hl(r.title || r.no, kw) + '</span></div>' +
    '<div class="rc-meta">' +
      '<span>' + hl(r.no, kw) + '</span>' +
      (r.recv_date ? '<span>' + r.recv_date + '</span>' : '') +
      (r.country ? '<span>' + hl(r.country, kw) + '</span>' : '') +
      (r.dist ? '<span>' + hl(r.dist, kw) + '</span>' : '') +
      (r.item ? '<span>Item: ' + hl(r.item, kw) + '</span>' : '') +
      (r.lot ? '<span>LOT: ' + hl(r.lot, kw) + '</span>' : '') +
      termTag(r.term) +
    '</div>' +
    '<div class="rc-body">' + hl(snippet, kw) + '</div>' +
    '</div>';
}

// ── Guide 카드 ──
function renderGuideCard(r, kw, idx) {
  _guideResultMap[idx] = r;
  var title = '', metaParts = [], body = '';
  if (r._type === 'ei') {
    title = r.error_code || ''; metaParts = [r.device, r.category]; body = r.symptom_summary || '';
  } else if (r._type === 'afias_d') {
    title = (r.error_code || '').split('\n')[0]; metaParts = [r.device, r.category];
    body = Array.isArray(r.causes) ? r.causes.map(function(c){return c.cause||'';}).join(' / ').slice(0,120) : '';
  } else if (r._type === 'afias_e' || r._type === 'ichroma_e') {
    title = r.symptom || ''; metaParts = [r.device];
    body = Array.isArray(r.causes) ? r.causes.map(function(c){return c.cause||'';}).join(' / ').slice(0,120) : '';
  } else if (r._type === 'faq') {
    title = r.symptom || ''; metaParts = [r.device, r.error_code]; body = (r.answer || '').slice(0,120);
  }
  var metaHtml = metaParts.filter(Boolean).map(function(m){return '<span>' + hl(m,kw) + '</span>';}).join('');
  return '<div class="result-card" onclick="showGuideDetail(' + idx + ')">' +
    '<div class="rc-header"><span class="rc-source source-guide">Guide</span><span class="rc-title">' + hl(title, kw) + '</span></div>' +
    '<div class="rc-meta">' + metaHtml + '</div>' +
    '<div class="rc-body">' + hl(body, kw) + '</div>' +
    '</div>';
}

// ── Claim 상세 ──
function showClaimDetail(no) {
  var r = CLAIM_MAP[no];
  if (!r) return;
  var fields = [
    ['Complaint No.', r.no, false], ['수신일', r.recv_date, false], ['담당자', r.receiver, false],
    ['상태', termTag(r.term), false], ['국가 / 지역', (r.country||'') + ' / ' + (r.area||''), false],
    ['Distributor', r.dist, false], ['연락처', r.contact, false], ['이메일', r.email, false],
    ['Via', r.via, false], ['중증도', severityTag(r.severity), false],
    ['---분류', '', false], ['1st CLASS', r.c1, false], ['2nd CLASS', r.c2, false], ['3rd CLASS', r.c3, false],
    ['---기기/제품', '', false], ['Item', r.item, false], ['LOT No.', r.lot, false],
    ['Control LOT', r.ctrl_lot, false], ['Device', r.device, false], ['Serial No.', r.serial, false], ['SW Version', r.sw, false],
    ['---내용', '', false], ['제목', r.title, true], ['클레임 내용', r.complaint, true],
    ['조사 내용', r.invest, true], ['Action', r.action, true], ['Reply', r.reply, true],
    ['회신일', r.replied, false], ['처리기간(일)', r.dur, false]
  ];
  var html = '<div class="modal-title">' + (r.title || r.no) + '</div><div class="modal-sub">' + r.no + '</div><div class="modal-grid">';
  fields.forEach(function(f) {
    if (f[0].startsWith('---')) { html += '<div class="mf-divider">' + f[0].slice(3) + '</div>'; }
    else { html += '<div class="mf' + (f[2] ? ' full' : '') + '"><label>' + f[0] + '</label><p>' + (f[1] || '-') + '</p></div>'; }
  });
  html += '</div>';
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

// ── Guide 상세 ──
function showGuideDetail(idx) {
  var r = _guideResultMap[idx];
  if (!r) return;
  function causesBlock(causes) {
    if (!Array.isArray(causes)) return '<p>-</p>';
    return causes.map(function(c, i) {
      return '<div class="cause-item"><div class="cause-title">' + (i+1) + '. ' + (c.cause||'') + '</div>' +
        (c.error_code ? '<div class="cause-detail">에러코드: ' + c.error_code + '</div>' : '') +
        (c.check ? '<div class="cause-detail">확인: ' + c.check + '</div>' : '') +
        (c.solution ? '<div class="cause-solution">해결: ' + c.solution + '</div>' : '') + '</div>';
    }).join('');
  }
  var html = '';
  if (r._type === 'ei') {
    html = '<div class="modal-title">' + (r.error_code||'') + '</div><div class="modal-sub">에러 인덱스 &mdash; ' + (r.device||'') + '</div>' +
      '<div class="modal-grid"><div class="mf"><label>에러코드</label><p>' + (r.error_code||'-') + '</p></div>' +
      '<div class="mf"><label>장비</label><p>' + (r.device||'-') + '</p></div>' +
      '<div class="mf"><label>카테고리</label><p>' + (r.category||'-') + '</p></div>' +
      '<div class="mf full"><label>증상 요약</label><p>' + (r.symptom_summary||'-') + '</p></div></div>';
  } else if (r._type === 'afias_d') {
    html = '<div class="modal-title">' + (r.error_code||'').split('\n')[0] + '</div><div class="modal-sub">AFIAS 에러 상세 &mdash; ' + (r.device||'') + '</div>' +
      '<div class="modal-grid"><div class="mf"><label>에러코드</label><p>' + (r.error_code||'-') + '</p></div>' +
      '<div class="mf"><label>장비</label><p>' + (r.device||'-') + '</p></div>' +
      '<div class="mf"><label>카테고리</label><p>' + (r.category||'-') + '</p></div>' +
      '<div class="mf-divider">원인 및 해결책</div><div class="mf full">' + causesBlock(r.causes) + '</div></div>';
  } else if (r._type === 'afias_e' || r._type === 'ichroma_e') {
    var label2 = r._type === 'afias_e' ? 'AFIAS' : 'ichroma';
    html = '<div class="modal-title">' + (r.symptom||'') + '</div><div class="modal-sub">' + label2 + ' 증상별 에러 &mdash; ' + (r.device||'') + '</div>' +
      '<div class="modal-grid"><div class="mf"><label>장비</label><p>' + (r.device||'-') + '</p></div>' +
      '<div class="mf-divider">원인 및 해결책</div><div class="mf full">' + causesBlock(r.causes) + '</div></div>';
  } else if (r._type === 'faq') {
    html = '<div class="modal-title">' + (r.symptom||'') + '</div><div class="modal-sub">FAQ &mdash; ' + (r.device||'') + '</div>' +
      '<div class="modal-grid"><div class="mf"><label>장비</label><p>' + (r.device||'-') + '</p></div>' +
      '<div class="mf"><label>분류</label><p>' + (r.error_code||'-') + '</p></div>' +
      '<div class="mf full"><label>답변</label><p>' + (r.answer||'-') + '</p></div>' +
      (r.ref ? '<div class="mf full"><label>참고</label><p>' + r.ref + '</p></div>' : '') + '</div>';
  }
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

// ── 실시간 검색 이벤트 ──
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  var val = this.value.trim();
  if (!val) { clearSearch(); return; }
  if (val.length < 2) return;
  searchTimer = setTimeout(runSearch, 400);
});
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { clearTimeout(searchTimer); runSearch(); }
});

// ── 데이터 초기화 (스크립트 로드 완료 후 호출) ──
function _initData() {
  try {
    var raw2024 = (typeof RAW_2024 !== 'undefined') ? RAW_2024 : [];
    var raw2025 = (typeof RAW_2025 !== 'undefined') ? RAW_2025 : [];
    var raw2026 = (typeof RAW_2026 !== 'undefined') ? RAW_2026 : [];
    var guideData = (typeof GUIDE_DATA !== 'undefined') ? GUIDE_DATA : {};

    CLAIM_ALL = normalizeClaim(raw2024).concat(normalizeClaim(raw2025)).concat(normalizeClaim(raw2026));
    GUIDE_ALL = flattenGuide(guideData);
    CLAIM_MAP = {};
    CLAIM_ALL.forEach(function(r) { CLAIM_MAP[r.no] = r; });
    _dataReady = true;

    var banner = document.getElementById('loadingBanner');
    if (banner) banner.style.display = 'none';

    // URL 파라미터 자동 검색
    var params = new URLSearchParams(window.location.search);
    var q = params.get('q');
    if (q) {
      document.getElementById('searchInput').value = q;
      runSearch();
    }
  } catch(e) {
    var banner = document.getElementById('loadingBanner');
    if (banner) {
      document.getElementById('loadingSpinner').style.display = 'none';
      document.getElementById('loadingText').textContent = '데이터 초기화 오류: ' + e.message + ' — 페이지를 새로고침해 주세요.';
    }
  }
}

// ── 동적 스크립트 로드 (Head 차단 없이 비동기 로드) ──
(function() {
  function loadScript(src, onLoad, onError) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = onLoad;
    s.onerror = function() {
      var banner = document.getElementById('loadingBanner');
      if (banner) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('loadingText').textContent = src + ' 파일을 불러올 수 없습니다. 파일이 같은 폴더에 있는지 확인해 주세요.';
      }
      if (onError) onError(src);
    };
    document.head.appendChild(s);
  }

  // claim-data.js 먼저, 완료 후 guide-data.js 로드
  loadScript('claim-data.js', function() {
    loadScript('guide-data.js', function() {
      _initData();
    });
  });
})();
</script>
</body>
</html>
